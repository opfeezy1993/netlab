---
- name: Backup running-configs from all devices
  hosts: all
  gather_facts: true
  vars:
    backup_root: "{{ playbook_dir }}/../backups"
    backup_dir: "{{ backup_root }}/{{ ansible_date_time.date }}"

  tasks:
    - name: Ensure today's backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true

    - name: Grab running-config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: rc

    - name: Write running-config to file
      ansible.builtin.copy:
        content: "{{ rc.stdout[0] }}\n"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}.cfg"
        mode: "0644"
      delegate_to: localhost

    - name: Report
      ansible.builtin.debug:
        msg: "Backed up {{ inventory_hostname }} -> {{ backup_dir }}/{{ inventory_hostname }}.cfg"
