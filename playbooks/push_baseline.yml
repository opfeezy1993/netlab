---
- name: Render and push baseline config
  hosts: all
  gather_facts: false

  vars:
    rendered_dir: "{{ playbook_dir }}/../rendered"
    template_file: >-
      {{ 'switch_baseline.j2' if device_role == 'switch' else 'router_baseline.j2' }}

  tasks:
    - name: Ensure rendered/ exists on control node
      ansible.builtin.file:
        path: "{{ rendered_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true

    - name: Render config from template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/{{ template_file }}"
        dest: "{{ rendered_dir }}/{{ inventory_hostname }}.cfg"
        mode: "0644"
      delegate_to: localhost

    - name: Push config (diff-aware, saves on change)
      cisco.ios.ios_config:
        src: "{{ rendered_dir }}/{{ inventory_hostname }}.cfg"
        save_when: modified
      register: push_result

    - name: Report diff status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          {{ 'changes applied' if push_result.changed else 'no changes' }}
